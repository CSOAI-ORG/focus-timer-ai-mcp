[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "focus-timer-ai-mcp"
version = "0.1.0"
description = "Run deep-focus timers with distraction logging and daily focus score calculations."
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.10"
dependencies = [
    "mcp>=1.0.0",
    "pydantic>=2.0",
]

[project.scripts]
focus_timer_ai_mcp = "focus_timer_ai_mcp.server:main"
